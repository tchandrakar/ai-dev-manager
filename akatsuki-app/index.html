<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval';" />
    <title>Akatsuki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body {
        background: #070B14;
        color: #E6EDF3;
        font-family: 'Outfit', 'Helvetica Neue', Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0D1117; }
      ::-webkit-scrollbar-thumb { background: #1E2D45; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #263554; }
    </style>
  </head>
  <body>
    <script>
      // Browser dev mock – only active outside Electron
      if (!window.akatsuki) {
        const noop = () => Promise.resolve({});
        const noopNull = () => Promise.resolve(null);
        window.akatsuki = {
          config:  { load: () => Promise.resolve({}), save: noop },
          workdir: { select: () => Promise.resolve({ canceled: true }), init: noop, open: noop, stats: noopNull, clear: noop },
          memory:  { saveReview: noop, updateOutcome: noop, queryContext: () => Promise.resolve({}), buildContextBlock: () => Promise.resolve(""), getStats: noopNull, listReviews: () => Promise.resolve({ reviews: [] }) },
          review:  { saveFile: noop, deleteFile: noop },
          ai:      { review: noop, chat: noop },
          git:     { fetchPR: noop, fetchDiff: noop, postReview: noop, testAuth: () => Promise.resolve({ ok: true, username: "demo-user", name: "Demo" }), bitbucketWorkspaces: () => Promise.resolve({ workspaces: [{ slug: "my-workspace", name: "My Workspace" }, { slug: "demo-org", name: "Demo Org" }] }) },
          shell:   { openExternal: (url) => { window.open(url, "_blank"); return Promise.resolve({}); } },
          kawaiidb: {
            testConnection: (opts) => new Promise(resolve => setTimeout(() => resolve({ ok: true, msg: `Connected — ${(opts?.type || "database").replace(/^\w/, c => c.toUpperCase())} (browser preview)` }), 600)),
            connect: (opts) => new Promise(resolve => setTimeout(() => resolve({ ok: true, version: `${(opts?.type || "DB").replace(/^\w/, c => c.toUpperCase())} (browser mock)` }), 400)),
            disconnect: () => Promise.resolve({ ok: true }),
            executeQuery: (opts) => new Promise(resolve => setTimeout(() => {
              const sql = (opts?.sql || "").trim().toUpperCase();
              if (sql.startsWith("SELECT")) {
                resolve({ columns: ["id","name","email","created_at"], rows: [
                  {id:1,name:"Alice Johnson",email:"alice@example.com",created_at:"2024-01-15T10:30:00Z"},
                  {id:2,name:"Bob Smith",email:"bob@example.com",created_at:"2024-02-03T14:22:00Z"},
                  {id:3,name:"Carol Chen",email:"carol@example.com",created_at:"2024-03-10T09:15:00Z"},
                  {id:4,name:"David Park",email:"david@example.com",created_at:"2024-04-22T16:45:00Z"},
                  {id:5,name:"Eva Martinez",email:"eva@example.com",created_at:"2024-05-08T11:00:00Z"},
                ], rowCount:5, duration: Math.floor(Math.random()*50)+5 });
              } else { resolve({ columns:[], rows:[], rowCount:1, duration:Math.floor(Math.random()*20)+2, message:"1 row affected" }); }
            }, 300)),
            fetchSchema: () => new Promise(resolve => setTimeout(() => resolve({
              tables: [
                {name:"users",rowCount:1247,columns:[{name:"id",type:"INT",pk:true},{name:"username",type:"VARCHAR(50)"},{name:"email",type:"VARCHAR(255)"},{name:"status",type:"VARCHAR(20)"},{name:"created_at",type:"TIMESTAMP"}]},
                {name:"orders",rowCount:8432,columns:[{name:"id",type:"INT",pk:true},{name:"user_id",type:"INT",fk:true,fkTable:"users",fkColumn:"id"},{name:"total",type:"DECIMAL(10,2)"},{name:"status",type:"VARCHAR(20)"},{name:"created_at",type:"TIMESTAMP"}]},
                {name:"products",rowCount:356,columns:[{name:"id",type:"INT",pk:true},{name:"name",type:"VARCHAR(200)"},{name:"price",type:"DECIMAL(10,2)"},{name:"category_id",type:"INT",fk:true,fkTable:"categories",fkColumn:"id"},{name:"stock",type:"INT"}]},
                {name:"categories",rowCount:24,columns:[{name:"id",type:"INT",pk:true},{name:"name",type:"VARCHAR(100)"},{name:"parent_id",type:"INT"}]},
                {name:"order_items",rowCount:21540,columns:[{name:"id",type:"INT",pk:true},{name:"order_id",type:"INT",fk:true,fkTable:"orders",fkColumn:"id"},{name:"product_id",type:"INT",fk:true,fkTable:"products",fkColumn:"id"},{name:"quantity",type:"INT"},{name:"price",type:"DECIMAL(10,2)"}]},
                {name:"payments",rowCount:7890,columns:[{name:"id",type:"INT",pk:true},{name:"order_id",type:"INT",fk:true,fkTable:"orders",fkColumn:"id"},{name:"amount",type:"DECIMAL(10,2)"},{name:"method",type:"VARCHAR(50)"},{name:"paid_at",type:"TIMESTAMP"}]},
              ],
              views:["v_active_orders","v_revenue_summary"],
              storedProcedures:["sp_process_order","sp_daily_report"],
              functions:["fn_calc_tax","fn_format_currency"],
            }), 500)),
            fetchTableData: (opts) => new Promise(resolve => setTimeout(() => {
              const rows = Array.from({length:10},(_,i) => ({id:((opts?.page||1)-1)*10+i+1,name:`Row ${((opts?.page||1)-1)*10+i+1}`,value:Math.floor(Math.random()*1000),created_at:new Date(Date.now()-Math.random()*1e10).toISOString()}));
              resolve({columns:["id","name","value","created_at"],rows,totalRows:100,page:opts?.page||1,pageSize:opts?.pageSize||25});
            }, 300)),
            getServerInfo: () => new Promise(resolve => setTimeout(() => resolve({
              version:"PostgreSQL 16.1 (mock)",uptime:"47d 12h 33m",
              serverInfo:[{label:"Server",value:"PostgreSQL 16.1 (mock)"},{label:"Database",value:"ecommerce_prod"},{label:"Uptime",value:"47d 12h 33m"},{label:"Database Size",value:"342.7 MB"},{label:"Active Connections",value:"24 / 100",progress:24,progressColor:"#3DEFE9"},{label:"Buffer Pool",value:"68% used",progress:68,progressColor:"#3FB950"},{label:"Slow Queries",value:"12"},{label:"Total Queries",value:"1,247,832"}],
              metrics:{queriesPerSec:1247,avgQueryTime:23,diskUsed:34.7,diskTotal:100},
            }), 400)),
            getActiveQueries: () => new Promise(resolve => setTimeout(() => resolve({queries:[
              {pid:12847,user:"app_user",db:"ecommerce_prod",query:"SELECT * FROM orders WHERE status = 'pending' ORDER BY created_at",duration:"2s",state:"active"},
              {pid:12901,user:"analytics",db:"ecommerce_prod",query:"SELECT DATE(created_at), SUM(total) FROM orders GROUP BY 1",duration:"8s",state:"active"},
            ]}), 200)),
            getQueryStats: () => new Promise(resolve => setTimeout(() => resolve({stats:{select:84320,insert:12450,update:7230,delete:1890}}), 200)),
            explainQuery: () => new Promise(resolve => setTimeout(() => resolve({plan:[
              {table:"orders",type:"ALL",rows:"~8432",key:null,extra:"Using where; Using filesort"},
              {table:"users",type:"ref",rows:"~1",key:"PRIMARY",extra:"Using index"},
            ]}), 300)),
          },
          shinra: (() => {
            const _mockTree = {
              "/mock-project": [
                { name: "src", isDir: true, path: "/mock-project/src" },
                { name: "docs", isDir: true, path: "/mock-project/docs" },
                { name: "package.json", isDir: false, path: "/mock-project/package.json" },
                { name: "tsconfig.json", isDir: false, path: "/mock-project/tsconfig.json" },
                { name: "README.md", isDir: false, path: "/mock-project/README.md" },
              ],
              "/mock-project/src": [
                { name: "components", isDir: true, path: "/mock-project/src/components" },
                { name: "utils", isDir: true, path: "/mock-project/src/utils" },
                { name: "index.ts", isDir: false, path: "/mock-project/src/index.ts" },
                { name: "app.tsx", isDir: false, path: "/mock-project/src/app.tsx" },
              ],
              "/mock-project/src/components": [
                { name: "Button.tsx", isDir: false, path: "/mock-project/src/components/Button.tsx" },
                { name: "Header.tsx", isDir: false, path: "/mock-project/src/components/Header.tsx" },
                { name: "Modal.tsx", isDir: false, path: "/mock-project/src/components/Modal.tsx" },
              ],
              "/mock-project/src/utils": [
                { name: "api.ts", isDir: false, path: "/mock-project/src/utils/api.ts" },
                { name: "helpers.ts", isDir: false, path: "/mock-project/src/utils/helpers.ts" },
              ],
              "/mock-project/docs": [
                { name: "getting-started.md", isDir: false, path: "/mock-project/docs/getting-started.md" },
              ],
            };
            const _mockFiles = {
              "/mock-project/src/index.ts": 'import { createApp } from "./app";\nimport { setupLogger } from "./utils/helpers";\n\nconst logger = setupLogger("main");\n\nasync function bootstrap() {\n  logger.info("Starting application...");\n  const app = await createApp({ port: 3000 });\n  await app.listen();\n  logger.info(`Server running on port ${app.port}`);\n}\n\nbootstrap().catch((err) => {\n  logger.error("Fatal error:", err);\n  process.exit(1);\n});\n',
              "/mock-project/src/app.tsx": 'import React from "react";\nimport { Header } from "./components/Header";\nimport { Button } from "./components/Button";\n\ninterface AppProps {\n  title?: string;\n  theme?: "light" | "dark";\n}\n\nexport function App({ title = "My App", theme = "dark" }: AppProps) {\n  const [count, setCount] = React.useState(0);\n\n  return (\n    <div className={`app app--${theme}`}>\n      <Header title={title} />\n      <main>\n        <p>Count: {count}</p>\n        <Button onClick={() => setCount(c => c + 1)}>Increment</Button>\n      </main>\n    </div>\n  );\n}\n',
              "/mock-project/src/components/Button.tsx": 'import React from "react";\n\ninterface ButtonProps {\n  children: React.ReactNode;\n  onClick?: () => void;\n  variant?: "primary" | "secondary" | "danger";\n  disabled?: boolean;\n}\n\nexport function Button({ children, onClick, variant = "primary", disabled }: ButtonProps) {\n  return (\n    <button\n      className={`btn btn--${variant}`}\n      onClick={onClick}\n      disabled={disabled}\n    >\n      {children}\n    </button>\n  );\n}\n',
              "/mock-project/src/utils/api.ts": 'const BASE_URL = process.env.API_URL || "http://localhost:4000";\n\nexport async function fetchJSON<T>(path: string, opts?: RequestInit): Promise<T> {\n  const res = await fetch(`${BASE_URL}${path}`, {\n    headers: { "Content-Type": "application/json" },\n    ...opts,\n  });\n  if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);\n  return res.json();\n}\n\nexport const api = {\n  getUsers: () => fetchJSON("/api/users"),\n  getUser: (id: string) => fetchJSON(`/api/users/${id}`),\n  createUser: (data: unknown) => fetchJSON("/api/users", { method: "POST", body: JSON.stringify(data) }),\n};\n',
              "/mock-project/package.json": '{\n  "name": "mock-project",\n  "version": "1.0.0",\n  "scripts": {\n    "dev": "vite",\n    "build": "tsc && vite build",\n    "test": "vitest"\n  },\n  "dependencies": {\n    "react": "^18.2.0",\n    "react-dom": "^18.2.0"\n  }\n}\n',
              "/mock-project/README.md": '# Mock Project\n\nA sample project for testing the **Shinra Tensei** IDE.\n\n## Getting Started\n\n1. Install dependencies: `npm install`\n2. Start dev server: `npm run dev`\n3. Build for production: `npm run build`\n\n## Features\n\n- React 18 with TypeScript\n- Vite for fast builds\n- Vitest for testing\n\n> This is a blockquote for testing markdown rendering.\n\n## API Reference\n\n| Method | Endpoint | Description |\n|--------|----------|-------------|\n| GET    | /api/users | List all users |\n| POST   | /api/users | Create a user |\n\n---\n\n[Documentation](https://example.com) | [GitHub](https://github.com)\n',
              "/mock-project/tsconfig.json": '{\n  "compilerOptions": {\n    "target": "ES2020",\n    "module": "ESNext",\n    "lib": ["ES2020", "DOM"],\n    "jsx": "react-jsx",\n    "strict": true,\n    "esModuleInterop": true,\n    "skipLibCheck": true,\n    "outDir": "./dist",\n    "rootDir": "./src"\n  },\n  "include": ["src/**/*"],\n  "exclude": ["node_modules", "dist"]\n}\n',
              "/mock-project/docs/getting-started.md": '# Getting Started\n\n## Prerequisites\n\n- Node.js >= 18\n- npm >= 9\n\n## Installation\n\n```bash\nnpm install\n```\n\n## Development\n\n```bash\nnpm run dev\n```\n\nOpen [http://localhost:5173](http://localhost:5173) in your browser.\n',
              "/mock-project/src/utils/helpers.ts": 'export function formatDate(date: Date): string {\n  return date.toISOString().split("T")[0];\n}\n\nexport function debounce<T extends (...args: unknown[]) => void>(fn: T, ms: number): T {\n  let timer: ReturnType<typeof setTimeout>;\n  return ((...args: unknown[]) => {\n    clearTimeout(timer);\n    timer = setTimeout(() => fn(...args), ms);\n  }) as T;\n}\n\nexport function setupLogger(name: string) {\n  return {\n    info: (...args: unknown[]) => console.log(`[${name}]`, ...args),\n    error: (...args: unknown[]) => console.error(`[${name}]`, ...args),\n  };\n}\n',
              "/mock-project/src/components/Header.tsx": 'import React from "react";\n\ninterface HeaderProps {\n  title: string;\n  subtitle?: string;\n}\n\nexport function Header({ title, subtitle }: HeaderProps) {\n  return (\n    <header className="header">\n      <h1>{title}</h1>\n      {subtitle && <p className="subtitle">{subtitle}</p>}\n    </header>\n  );\n}\n',
              "/mock-project/src/components/Modal.tsx": 'import React from "react";\n\ninterface ModalProps {\n  isOpen: boolean;\n  onClose: () => void;\n  title: string;\n  children: React.ReactNode;\n}\n\nexport function Modal({ isOpen, onClose, title, children }: ModalProps) {\n  if (!isOpen) return null;\n  return (\n    <div className="modal-overlay" onClick={onClose}>\n      <div className="modal" onClick={(e) => e.stopPropagation()}>\n        <div className="modal-header">\n          <h2>{title}</h2>\n          <button onClick={onClose}>x</button>\n        </div>\n        <div className="modal-body">{children}</div>\n      </div>\n    </div>\n  );\n}\n',
            };
            const _defaultContent = 'export default function Component() {\n  return <div>Hello World</div>;\n}\n';
            let _shellCbs = { stdout: null, stderr: null, exit: null };
            return {
              readDir: (dir) => Promise.resolve({ entries: _mockTree[dir] || [] }),
              readFile: (fp) => { const c = _mockFiles[fp] || _defaultContent; return Promise.resolve({ content: c, size: c.length, mtime: Date.now() }); },
              writeFile: () => Promise.resolve({ ok: true }),
              fileStat: (fp) => Promise.resolve({ size: (_mockFiles[fp] || "").length, isDir: false, isFile: true }),
              searchFiles: (opts) => { const q = (opts.query || "").toLowerCase(); const hits = Object.keys(_mockFiles).filter(f => f.toLowerCase().includes(q)).map(f => ({ file: f, line: 1, text: f.split("/").pop() })); return Promise.resolve({ results: hits.slice(0, 20) }); },
              runCommand: (opts) => new Promise(r => setTimeout(() => r({ stdout: `$ ${opts.cmd}\n[mock output]\n`, stderr: "", exitCode: 0 }), 300)),
              selectFolder: () => Promise.resolve({ canceled: false, path: "/mock-project" }),
              shellCreate: (opts) => { setTimeout(() => { if (_shellCbs.stdout) _shellCbs.stdout(`Welcome to mock shell\n${opts?.cwd || "/mock-project"} $ `); }, 200); return Promise.resolve({ ok: true, pid: 9999, shell: "/bin/zsh" }); },
              shellWrite: (data) => { setTimeout(() => { if (_shellCbs.stdout) _shellCbs.stdout(`[mock] ${data}`); }, 150); return Promise.resolve({ ok: true }); },
              shellDestroy: () => { _shellCbs = { stdout: null, stderr: null, exit: null }; return Promise.resolve({ ok: true }); },
              onShellStdout: (cb) => { _shellCbs.stdout = cb; },
              onShellStderr: (cb) => { _shellCbs.stderr = cb; },
              onShellExit: (cb) => { _shellCbs.exit = cb; },
              removeShellListeners: () => { _shellCbs = { stdout: null, stderr: null, exit: null }; },
              watchStart: () => Promise.resolve({ ok: true }),
              watchStop: () => Promise.resolve({ ok: true }),
              onFsChanged: () => {},
              removeFsListeners: () => {},
            };
          })(),
        };
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.jsx"></script>
  </body>
</html>
